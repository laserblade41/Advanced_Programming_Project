<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-blue-hover: #2563eb;
            --accent-green-hover: #059669;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: #3b82f6;
        }

        body {
            margin: 0;
            padding: 1.5rem;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Card styles */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 6px 24px -2px rgba(0, 0, 0, 0.4);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1.25rem;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .blue-title {
            color: var(--accent-blue);
        }

        .green-title {
            color: var(--accent-green);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"] {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        /* Custom File Upload */
        .file-upload-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .file-input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: var(--input-bg);
            border: 1px dashed var(--input-border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .file-upload-wrapper:hover .file-label {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
            color: var(--text-primary);
        }

        .file-name {
            font-size: 0.8rem;
            color: var(--accent-blue);
            text-align: center;
            word-break: break-all;
            min-height: 1.2rem;
            font-weight: 500;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-blue {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn-blue:hover {
            background: var(--accent-blue-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
        }

        .btn-blue:active {
            transform: translateY(0);
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-green:hover {
            background: var(--accent-green-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
        }

        .btn-green:active {
            transform: translateY(0);
        }

        /* Micro-animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Configuration Upload Form -->
    <div class="card">
        <h2 class="blue-title">
            <span>⚙️</span> Config Deployer
        </h2>
        <form action="http://localhost:8080/upload" method="post" enctype="multipart/form-data" target="graph-center" id="upload-form">
            <input type="hidden" name="filename" id="filename-hidden">
            <input type="hidden" name="Filename" id="filename-hidden-caps">
            
            <div class="form-group">
                <label>Configuration File</label>
                <div class="file-upload-wrapper">
                    <input type="file" name="file" class="file-input" id="file-input" required accept=".conf,.txt">
                    <div class="file-label" id="file-label-el">
                        <span>📂</span>
                        <span id="file-label-text">Select .conf file</span>
                    </div>
                </div>
                <div class="file-name" id="file-name-display"></div>
            </div>
            <button type="submit" class="btn-blue">deploy</button>
        </form>
    </div>

    <!-- Topic Publish Form -->
    <div class="card">
        <h2 class="green-title">
            <span>📡</span> Topic Publisher
        </h2>
        <form action="http://localhost:8080/publish" method="get" target="values-right" id="publish-form">
            <div class="form-group">
                <label for="topic-input">Topic Name</label>
                <input type="text" id="topic-input" name="topic" placeholder="e.g. A" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="message-input">Message Value</label>
                <input type="text" id="message-input" name="message" placeholder="e.g. 5.0" required autocomplete="off">
            </div>
            <button type="submit" class="btn-green">Send</button>
        </form>
    </div>

    <script>
        // Handle custom file input display and hidden inputs
        const fileInput = document.getElementById('file-input');
        const fileLabelText = document.getElementById('file-label-text');
        const fileNameDisplay = document.getElementById('file-name-display');
        const fileLabelEl = document.getElementById('file-label-el');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                const name = this.files[0].name;
                fileLabelText.textContent = "Change File";
                fileNameDisplay.textContent = name;
                fileLabelEl.style.borderColor = "var(--accent-blue)";
                fileLabelEl.style.background = "rgba(59, 130, 246, 0.05)";
                
                // Set the hidden input values for maximum compatibility
                document.getElementById('filename-hidden').value = name;
                document.getElementById('filename-hidden-caps').value = name;
            } else {
                fileLabelText.textContent = "Select .conf file";
                fileNameDisplay.textContent = "";
                fileLabelEl.style.borderColor = "var(--input-border)";
                fileLabelEl.style.background = "var(--input-bg)";
                
                document.getElementById('filename-hidden').value = "";
                document.getElementById('filename-hidden-caps').value = "";
            }
        });

        // Add case compatibility mapping parameters to Publish Form dynamically on submit
        const publishForm = document.getElementById('publish-form');
        publishForm.addEventListener('submit', function(e) {
            const topicInput = document.getElementById('topic-input').value;
            const messageInput = document.getElementById('message-input').value;

            // Remove any previously appended hidden elements
            document.querySelectorAll('.caps-hidden').forEach(el => el.remove());

            // Create capitalized versions: Topic and Message
            const hiddenTopic = document.createElement('input');
            hiddenTopic.type = 'hidden';
            hiddenTopic.name = 'Topic';
            hiddenTopic.value = topicInput;
            hiddenTopic.className = 'caps-hidden';
            this.appendChild(hiddenTopic);

            const hiddenMessage = document.createElement('input');
            hiddenMessage.type = 'hidden';
            hiddenMessage.name = 'Message';
            hiddenMessage.value = messageInput;
            hiddenMessage.className = 'caps-hidden';
            this.appendChild(hiddenMessage);
        });
    </script>
</body>
</html>
