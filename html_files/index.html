<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computational Graph Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #060913;
            --bg-surface: #0b0f19;
            --accent-primary: #3b82f6;
            --accent-primary-glow: rgba(59, 130, 246, 0.15);
            --border-glow: rgba(255, 255, 255, 0.05);
            --header-height: 70px;
            --font-display: 'Outfit', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: #f1f5f9;
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar Header */
        header {
            height: var(--header-height);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            font-family: var(--font-display);
        }

        .title-section h1 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-section p {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 500;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            color: #10b981;
            font-weight: 600;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        /* Dashboard IFrame Layout Grid */
        main.dashboard-container {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            gap: 1rem;
            padding: 1rem;
            height: calc(100vh - var(--header-height));
            background-color: var(--bg-base);
        }

        .panel {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .panel:hover {
            border-color: rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px 0 var(--accent-primary-glow);
        }

        /* IFrame styles */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: transparent;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            main.dashboard-container {
                grid-template-columns: 280px 1fr 240px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <div class="logo-icon">G</div>
            <div class="title-section">
                <h1>Computational Graph Dashboard</h1>
                <p>Advanced Programming • Exercise 6</p>
            </div>
        </div>
        <div class="status-badge">
            <span class="status-dot"></span>
            Server Connected
        </div>
    </header>

    <main class="dashboard-container">
        <!-- Left Panel: Form Control (form.html) -->
        <section class="panel">
            <iframe src="form.html" name="sidebar-left" title="Control Panel"></iframe>
        </section>

        <!-- Center Panel: Computational Graph Graph/temp.html -->
        <section class="panel">
            <iframe src="temp.html" name="graph-center" title="Graph Visualization"></iframe>
        </section>

        <!-- Right Panel: Topic Values Table (temp.html) -->
        <section class="panel">
            <iframe src="temp.html" name="values-right" title="Values Monitor"></iframe>
        </section>
    </main>

</body>
</html>
